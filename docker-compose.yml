# Dev environment for the VOLTTRON <-> FUXA integration.
#
#   modbus-sim   fake field device (live, writable registers)  -- DONE
#   volttron     platform-driver + Modbus driver + historian
#                + fuxa-bridge agent (VIP bus <-> WebSocket/REST) -- TODO
#   fuxa         FUXA UI + Volttron device connector             -- TODO
#
# Bring up incrementally, e.g.:  docker compose up modbus-sim
services:
  modbus-sim:
    build: ./modbus-sim
    container_name: vf-modbus-sim
    ports:
      - "5020:5020"     # Modbus TCP (VOLTTRON reaches it in-network; host for debug)
      - "5021:5021"     # scenario / fault-injection control API (MCP)
    restart: unless-stopped

  volttron:
    build: ./volttron
    container_name: vf-volttron
    depends_on: [modbus-sim]
    ports:
      - "8080:8080"   # fuxa-bridge WebSocket + REST (Phase 4)
    volumes:
      - "volttron-data:/home/volttron/.volttron/data"   # persist historian db
    restart: unless-stopped

  fuxa:
    # Local build of the FUXA fork (appletalk/FUXA, branch volttron-connector)
    # which adds the `Volttron` device connector. The checkout lives at ../FUXA.
    build:
      context: ../FUXA
    container_name: vf-fuxa
    depends_on: [volttron]
    volumes:
      - "./fuxa-data/appdata:/usr/src/app/FUXA/server/_appdata"
      - "./fuxa-data/db:/usr/src/app/FUXA/server/_db"
      - "./fuxa-data/logs:/usr/src/app/FUXA/server/_logs"
      - "./fuxa-data/images:/usr/src/app/FUXA/server/_images"
    ports:
      - "1881:1881"
    restart: unless-stopped

volumes:
  volttron-data:
